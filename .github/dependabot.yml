version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      tanstack:
        patterns:
          - "@tanstack/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
          - "@vitejs/plugin-react"
          - "eslint-plugin-react-hooks"
      markdown:
        patterns:
          - "remark-*"
          - "rehype-*"
          - "unified"
          - "unist-*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      eslint:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
          - "typescript-eslint"
      vite:
        patterns:
          - "vite"
          - "vite-*"
          - "@vitejs/*"
          - "vitest"
